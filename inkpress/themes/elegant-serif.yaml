# 典雅衬线风格 - Elegant Serif Magazine
# 温暖色调，衬线字体，书卷气

name: "典雅衬线"
description: "优雅衬线字体搭配暖棕色调，适合深度阅读和文学内容"
series: "classic"
tags: ["典雅", "衬线", "阅读"]

# 容器样式 - 暖白色底
container:
  max_width: "677px"
  padding: "20px"
  background: "#fefdfb"
  border_radius: "8px"
  box_shadow: "0 2px 12px rgba(139, 115, 85, 0.06)"

# H1 样式 - 深色衬线，居中
h1:
  style: |
    padding: 0.6em 0;
    margin: 1.8em 0 1em;
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    line-height: 1.4;
    color: #1a1a1a;
    font-family: Georgia, 'Times New Roman', serif;
    letter-spacing: 0.05em;

# H2 样式 - 暖棕色左边框
h2:
  style: |
    margin: 2em 0 0.8em;
    padding: 0.3em 0 0.3em 14px;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.3;
    color: #1a1a1a;
    font-family: Georgia, 'Times New Roman', serif;
    border-left: 4px solid #8b7355;

# H3 样式
h3:
  style: |
    margin: 1.8em 0 0.6em;
    padding: 0.2em 0 0.2em 12px;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
    color: #2c2c2c;
    font-family: Georgia, 'Times New Roman', serif;
    border-left: 3px solid #a08c6e;

# H4 样式
h4:
  style: |
    margin: 1.5em 0 0.5em;
    padding: 0.2em 0 0.2em 10px;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
    color: #2c2c2c;
    font-family: Georgia, 'Times New Roman', serif;
    border-left: 3px solid #b8a88a;

# H5 样式
h5:
  style: |
    margin: 1.2em 0 0.4em;
    padding: 0 0 0 8px;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
    color: #3c3c3c;
    font-family: Georgia, 'Times New Roman', serif;
    border-left: 2px solid #c4b49a;

# H6 样式
h6:
  style: |
    margin: 1em 0 0.3em;
    padding: 0 0 0 8px;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.3;
    color: #555555;
    font-family: Georgia, 'Times New Roman', serif;
    border-left: 2px solid #d4c8b0;

# 段落样式 - 衬线字体，舒适行距
paragraph:
  style: |
    margin: 1.4em 0;
    color: #2c2c2c;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 16px;
    line-height: 1.85;
    text-align: justify;

# 列表样式
list:
  container_style: |
    list-style: none;
    padding: 0;
    margin: 1.2em 0;
    color: #2c2c2c;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 16px;

  item_style: |
    margin: 0.5em 0;
    padding: 0;
    line-height: 1.8;
    font-size: 16px;

  ul_prefix: "- "
  ol_prefix: "{n}. "

  nested_container_style: |
    list-style: none;
    padding: 0 0 0 1.5em;
    margin: 0.3em 0;
    font-size: 15px;

  nested_item_style: |
    margin: 0.3em 0;
    padding: 0;
    line-height: 1.75;
    font-size: 15px;
    color: #2c2c2c;

  nested_ul_prefix: "◦ "

# 代码块样式 - 暖灰底
code_block:
  style: |
    margin: 1.5em 0;
    padding: 1.2em;
    background-color: #f5f3ef;
    border-radius: 6px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.5;
    border: 1px solid #e8e2d8;

  code_inner_style: |
    background: none;
    padding: 0;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    font-size: 14px;
    color: #2c2c2c;
    line-height: 1.5;

# 内联代码样式
inline_code:
  style: |
    font-size: 90%;
    color: #8b7355;
    background-color: #f5f3ef;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    border: 1px solid #e8e2d8;

# 引用样式 - 暖棕色左边框，斜体衬线
blockquote:
  style: |
    margin: 1.5em 0;
    padding: 1em 1.5em;
    border-left: 4px solid #8b7355;
    background-color: rgba(139, 115, 85, 0.04);
    border-radius: 4px;

  p_inner_style: |
    margin: 0;
    color: #555555;
    line-height: 1.8;
    font-style: italic;
    font-family: Georgia, 'Times New Roman', serif;

# 链接样式 - 暖棕色
link:
  style: |
    color: #8b7355;
    text-decoration: none;
    border-bottom: 1px solid rgba(139, 115, 85, 0.4);

# 图片样式
image:
  container_style: |
    margin: 2em 0;
    text-align: center;
    line-height: 1.6;
    font-size: 13px;
    color: #999999;
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;

  img_style: |
    max-width: 100%;
    display: block;
    margin: 1.5em auto;
    border-radius: 4px;
    box-shadow: 0 2px 10px rgba(139, 115, 85, 0.1);


  caption_style: |
    text-align: center;
    font-size: 0.85em;
    color: #a08c6e;
    margin-top: 0.5em;
    font-style: italic;
    font-family: Georgia, 'Times New Roman', serif;

# 表格样式
table:
  wrapper_style: |
    overflow-x: auto;
    margin: 1.5em 8px;

  tr_odd_style: |
    background: rgba(139, 115, 85, 0.04);

  style: |
    width: 100%;
    border-collapse: collapse;
    margin: 1.5em 0;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 15px;

  th_style: |
    padding: 12px 15px;
    text-align: left;
    font-weight: 700;
    color: #1a1a1a;
    border-bottom: 2px solid #8b7355;
    background-color: rgba(139, 115, 85, 0.06);

  td_style: |
    padding: 10px 15px;
    border-bottom: 1px solid #e8e2d8;
    color: #2c2c2c;

# 分隔线样式 - 留空，使用 hr_text 装饰
hr:
  style: ""

# 粗体样式 - 深棕色
bold:
  style: |
    font-weight: 700;
    color: #5c4a32;

# 斜体样式
italic:
  style: |
    font-style: italic;
    color: #8b7355;

# 删除线样式
strikethrough:
  style: |
    text-decoration: line-through;
    color: #bbbbbb;

# 对话样式
dialogue:
  container_style: |
    margin: 2em 0;
    padding: 20px;
    background-color: #faf8f5;
    border-radius: 8px;
    border: 1px solid #e8e2d8;

  title_style: |
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    color: #8b7355;
    text-align: center;
    font-family: Georgia, 'Times New Roman', serif;

  message_style: |
    display: flex;
    margin-bottom: 16px;
    align-items: flex-start;

  bubble_left_style: |
    background-color: #ffffff;
    color: #2c2c2c;
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 65%;
    word-wrap: break-word;
    border: 1px solid #e8e2d8;
    font-family: Georgia, 'Times New Roman', serif;

  bubble_right_style: |
    background-color: #8b7355;
    color: #ffffff;
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 65%;
    word-wrap: break-word;
    box-shadow: 0 2px 8px rgba(139, 115, 85, 0.2);

  avatar_style: |
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 14px;
    flex-shrink: 0;
    margin: 0 12px;

  avatar_left_style: |
    background-color: #f0ebe4;
    color: #8b7355;
    border: 1px solid #e8e2d8;

  avatar_right_style: |
    background-color: #8b7355;
    color: #ffffff;

# 装饰配置
decorations:
  h2_prefix: "§ "
  blockquote_prefix: "「"
  blockquote_suffix: "」"
  hr_text: "— ✦ —"

# 页面背景
body:
  background: "#f9f7f3"
  padding: "16px"
  margin: "0"

# 脚注样式
footnote:
  sup_style: |
    font-size: 0.75em;
    line-height: 0;
    vertical-align: super;
    margin: 0;
    padding: 0;
  ref_style: |
    color: inherit;
    text-decoration: none;
    border-bottom: 1px dashed #8b7355;
    padding-bottom: 1px;
  section_style: |
    margin-top: 2.5em;
    padding-top: 1.8em;
    border-top: 1px solid #e8e2d8;
  list_style: |
    list-style-type: decimal;
    margin: 0;
    padding-left: 1.5em;
  item_style: |
    font-size: 0.85em;
    color: #a09080;
    line-height: 1.6;
    margin-bottom: 0.3em;
  backref_style: |
    color: #8b7355;
    text-decoration: none;
    margin-left: 0.3em;

# GFM 提示框样式
gfm_alert:
  container_style: |
    margin: 1.5em 8px;
    padding: 12px 16px;
    border-radius: 4px;
  title_style: |
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  content_style: |
    color: #2c2c2c;
    line-height: 1.6;
    font-size: 14px;
  note_color: "#8b7355"
  tip_color: "#5c8a3a"
  important_color: "#b8860b"
  warning_color: "#a0522d"
  caution_color: "#8b6914"

# 图片说明样式
