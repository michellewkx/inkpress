# Sakura theme
# 柔粉珊瑚系，温柔细腻，生活/美妆/女性内容

name: "樱花粉"
description: "柔粉珊瑚系，温柔细腻，生活/美妆/女性内容"
series: "social"
tags: ["粉色", "温柔", "樱花", "女性"]

# 容器样式
container:
  max_width: "677px"
  padding: "24px 20px"
  background: "#fffbfc"
  border_radius: "16px"
  box_shadow: "0 4px 20px rgba(219, 112, 147, 0.08)"

# 页面背景
body:
  background: "#fef5f7"
  padding: "18px"

# H1 样式
h1:
  style: |
    padding: 0.7em 0;
    margin: 1.5em 0 1.2em;
    font-size: 23px;
    font-weight: 800;
    line-height: 1.4;
    color: #d4606e;
    text-align: center;
    letter-spacing: 0.06em;
    border-bottom: 2px solid #f0c4cb;
    font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;

# H2 样式
h2:
  style: |
    margin: 2.5em 0 1em;
    padding: 0.5em 1.2em;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.5;
    color: #d4606e;
    text-align: center;
    background-color: #fdeef1;
    border-radius: 24px;
    font-family: 'PingFang SC', -apple-system, sans-serif;

# H3 样式
h3:
  style: |
    margin: 2em 0 0.8em;
    padding: 0.2em 0 0.2em 14px;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.5;
    color: #c9505e;
    border-left: 4px solid #f0a0b0;
    font-family: 'PingFang SC', -apple-system, sans-serif;

# H4 样式
h4:
  style: |
    margin: 1.5em 0 0.5em;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.4;
    color: #d4606e;

# H5 样式
h5:
  style: |
    margin: 1.2em 0 0.4em;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: #e08090;

# H6 样式
h6:
  style: |
    margin: 1em 0 0.3em;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    color: #c4a0a8;

# 段落样式
paragraph:
  style: |
    margin: 1.3em 0;
    letter-spacing: 0.04em;
    color: #4a3540;
    text-align: justify;
    line-height: 1.95;
    font-size: 15px;
    font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;

# 列表样式
list:
  container_style: |
    list-style: none;
    padding: 0;
    margin: 1.2em 0;
    color: #4a3540;
    font-size: 15px;
    font-family: 'PingFang SC', sans-serif;

  item_style: |
    margin: 0.6em 0;
    padding: 0;
    line-height: 1.85;
    font-size: 15px;

  ul_prefix: ""
  ol_prefix: "{n}. "

  nested_container_style: |
    list-style: none;
    padding: 0 0 0 1.5em;
    margin: 0.3em 0;
    font-size: 15px;

  nested_item_style: |
    margin: 0.3em 0;
    padding: 0;
    line-height: 1.75;
    font-size: 15px;
    color: #4a3540;

  nested_ul_prefix: "◦ "

# 代码块样式
code_block:
  style: |
    margin: 1.5em 0;
    padding: 1.2em;
    background-color: #fdf2f4;
    border-radius: 12px;
    overflow-x: auto;
    font-size: 13.5px;
    line-height: 1.6;
    border: 1px solid #f5dce0;

  code_inner_style: |
    background: none;
    padding: 0;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    font-size: 13.5px;
    color: #6b3a42;
    line-height: 1.6;

# 内联代码样式
inline_code:
  style: |
    font-size: 88%;
    color: #d4606e;
    background-color: rgba(212, 96, 110, 0.08);
    padding: 2px 8px;
    border-radius: 10px;
    font-family: 'SFMono-Regular', Consolas, monospace;

# 引用样式
blockquote:
  style: |
    margin: 1.8em 0;
    padding: 1.2em 1.5em;
    border-left: 4px solid #f0a0b0;
    background-color: #fef5f7;
    color: #5a3a42;
    border-radius: 0 12px 12px 0;

  p_inner_style: |
    margin: 0;
    color: #5a3a42;
    line-height: 1.85;
    font-style: normal;
    font-family: 'PingFang SC', sans-serif;

# 链接样式
link:
  style: |
    color: #d4606e;
    text-decoration: none;
    border-bottom: 1px dashed rgba(212, 96, 110, 0.4);

# 图片样式
image:
  container_style: |
    margin: 1.5em 0;
    text-align: center;

  img_style: |
    max-width: 100%;
    margin: 1em auto;
    display: block;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(219, 112, 147, 0.1);


  caption_style: |
    text-align: center;
    font-size: 0.85em;
    color: #e08090;
    margin-top: 0.5em;

# 表格样式
table:
  wrapper_style: |
    overflow-x: auto;
    margin: 1.5em 8px;

  tr_odd_style: |
    background: rgba(212, 96, 110, 0.04);

  style: |
    margin: 1.5em 0;
    width: 100%;
    border-collapse: collapse;
    font-size: 14.5px;
    border-radius: 12px;
    overflow: hidden;

  th_style: |
    background-color: #fdeef1;
    color: #c9505e;
    padding: 12px 14px;
    text-align: left;
    font-weight: 700;
    border-bottom: 2px solid #f0c4cb;

  td_style: |
    border-bottom: 1px solid #f5e0e4;
    padding: 10px 14px;
    color: #4a3540;

# 分隔线样式
hr:
  style: ""

# 粗体样式
bold:
  style: |
    font-weight: 800;
    color: #d4606e;

# 斜体样式
italic:
  style: |
    font-style: italic;
    color: #c08090;

# 删除线样式
strikethrough:
  style: |
    text-decoration: line-through;
    color: #ccc;

# 装饰配置
decorations:
  h2_prefix: ""
  hr_text: "· · ·"

# 脚注样式
footnote:
  sup_style: |
    font-size: 0.75em;
    line-height: 0;
    vertical-align: super;
    margin: 0;
    padding: 0;
  ref_style: |
    color: inherit;
    text-decoration: none;
    border-bottom: 1px dashed #d4606e;
    padding-bottom: 1px;
  section_style: |
    margin-top: 2.5em;
    padding-top: 1.8em;
    border-top: 1px solid #f0c4cb;
  list_style: |
    list-style-type: decimal;
    margin: 0;
    padding-left: 1.5em;
  item_style: |
    font-size: 0.85em;
    color: #b08090;
    line-height: 1.6;
    margin-bottom: 0.3em;
  backref_style: |
    color: #d4606e;
    text-decoration: none;
    margin-left: 0.3em;

# GFM 提示框样式
gfm_alert:
  container_style: |
    margin: 1.5em 8px;
    padding: 12px 16px;
    border-radius: 4px;
  title_style: |
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  content_style: |
    color: #4a3540;
    line-height: 1.6;
    font-size: 14px;
  note_color: "#d4606e"
  tip_color: "#e08090"
  important_color: "#c9505e"
  warning_color: "#b04050"
  caution_color: "#f0a0b0"
