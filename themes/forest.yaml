# Forest theme
# 自然有机感，翠绿棕木搭配，健康/教育/环保内容

name: "森林绿"
description: "自然有机感，翠绿棕木搭配，健康/教育/环保内容"
series: "classic"
tags: ["森林", "自然", "绿色", "有机"]

# 容器样式
container:
  max_width: "677px"
  padding: "24px 20px"
  background: "#fafdf7"
  border_radius: "12px"
  box_shadow: "0 4px 16px rgba(34, 120, 74, 0.06)"

# 页面背景
body:
  background: "#f0f5ec"
  padding: "18px"

# H1 样式
h1:
  style: |
    padding: 0.7em 0;
    margin: 1.5em 0 1.2em;
    font-size: 24px;
    font-weight: 800;
    line-height: 1.35;
    color: #1b4332;
    text-align: center;
    letter-spacing: 0.04em;
    border-top: 2px solid #2d6a4f;
    border-bottom: 2px solid #2d6a4f;
    font-family: Georgia, 'Noto Serif CJK SC', 'PingFang SC', serif;

# H2 样式
h2:
  style: |
    margin: 2.5em 0 1em;
    padding: 0.4em 0 0.4em 16px;
    font-size: 19px;
    font-weight: 800;
    line-height: 1.4;
    color: #1b4332;
    border-left: 5px solid #40916c;
    background-color: rgba(64, 145, 108, 0.06);
    font-family: Georgia, 'Noto Serif CJK SC', serif;

# H3 样式
h3:
  style: |
    margin: 2em 0 0.8em;
    padding: 0.1em 0;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.6;
    color: #2d6a4f;
    background: linear-gradient(transparent 60%, rgba(183, 228, 199, 0.4) 60%);
    display: inline-block;
    font-family: 'PingFang SC', -apple-system, sans-serif;

# H4 样式
h4:
  style: |
    margin: 1.5em 0 0.5em;
    padding-left: 12px;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.4;
    color: #40916c;
    border-left: 3px solid #52b788;

# H5 样式
h5:
  style: |
    margin: 1.2em 0 0.4em;
    padding-left: 10px;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: #52b788;
    border-left: 2px solid #95d5b2;

# H6 样式
h6:
  style: |
    margin: 1em 0 0.3em;
    padding-left: 8px;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    color: #74a892;

# 段落样式
paragraph:
  style: |
    margin: 1.3em 0;
    letter-spacing: 0.03em;
    color: #2d3a2e;
    text-align: justify;
    line-height: 1.95;
    font-size: 15px;
    font-family: Georgia, 'Noto Serif CJK SC', 'PingFang SC', serif;

# 列表样式
list:
  container_style: |
    list-style: none;
    padding: 0;
    margin: 1.2em 0;
    color: #2d3a2e;
    font-size: 15px;
    font-family: Georgia, 'Noto Serif CJK SC', serif;

  item_style: |
    margin: 0.6em 0;
    padding: 0;
    line-height: 1.85;
    font-size: 15px;

  ul_prefix: "🌿 "
  ol_prefix: "{n}. "

# 代码块样式
code_block:
  style: |
    margin: 1.5em 0;
    padding: 1.2em;
    background-color: #f0f5ec;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 13.5px;
    line-height: 1.6;
    border: 1px solid #d8e8d0;
    border-left: 3px solid #2d6a4f;

  code_inner_style: |
    background: none;
    padding: 0;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    font-size: 13.5px;
    color: #2d3a2e;
    line-height: 1.6;

# 内联代码样式
inline_code:
  style: |
    font-size: 88%;
    color: #2d6a4f;
    background-color: rgba(45, 106, 79, 0.08);
    padding: 2px 7px;
    border-radius: 4px;
    font-family: 'SFMono-Regular', Consolas, monospace;

# 引用样式
blockquote:
  style: |
    margin: 1.8em 0;
    padding: 1.2em 1.5em;
    border-left: 4px solid #52b788;
    background-color: rgba(149, 213, 178, 0.08);
    color: #3a4a3c;
    border-radius: 0 8px 8px 0;

  p_inner_style: |
    margin: 0;
    color: #3a4a3c;
    line-height: 1.9;
    font-style: normal;
    font-family: Georgia, 'Noto Serif CJK SC', serif;

# 链接样式
link:
  style: |
    color: #2d6a4f;
    text-decoration: none;
    border-bottom: 1px solid rgba(45, 106, 79, 0.3);

# 图片样式
image:
  container_style: |
    margin: 1.5em 0;
    text-align: center;

  img_style: |
    max-width: 100%;
    margin: 1em auto;
    display: block;
    border-radius: 8px;
    box-shadow: 0 4px 12px rgba(34, 120, 74, 0.08);

# 表格样式
table:
  style: |
    margin: 1.5em 0;
    width: 100%;
    border-collapse: collapse;
    font-size: 14.5px;

  th_style: |
    background-color: #2d6a4f;
    color: #f0f5ec;
    padding: 12px 14px;
    text-align: left;
    font-weight: 600;

  td_style: |
    border-bottom: 1px solid #d8e8d0;
    padding: 10px 14px;
    color: #2d3a2e;

# 分隔线样式
hr:
  style: |
    border: none;
    height: 2px;
    margin: 2.5em 0;
    background-color: #b7e4c7;

# 粗体样式
bold:
  style: |
    font-weight: 800;
    color: #2d6a4f;

# 斜体样式
italic:
  style: |
    font-style: italic;
    color: #52b788;
    font-family: Georgia, 'Noto Serif CJK SC', serif;

# 删除线样式
strikethrough:
  style: |
    text-decoration: line-through;
    color: #a8b8a0;

# 装饰配置
decorations: {}
