# 终端风格 - 复古终端 / 黑客风格
# 深色背景、绿色单色系、等宽字体

name: "终端"
description: "复古终端风格，绿色荧光字符，黑客极客感"
series: "tech"
tags: ["终端", "黑客", "极客"]

# 容器样式
container:
  max_width: "677px"
  padding: "16px"
  background: "#1a1a2e"
  border_radius: "12px"
  box_shadow: "0 0 20px rgba(0, 255, 65, 0.08)"

# H1 样式
h1:
  style: |
    margin: 1.5em 8px 0.75em 0px;
    padding: 0.6em 1em;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
    color: #00ff41;
    text-align: left;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;
    letter-spacing: 0.05em;
    border-bottom: 2px solid #00ff41;

# H2 样式
h2:
  style: |
    margin: 2em 8px 0.75em 0px;
    padding: 0px 0px 0.5em 12px;
    border-left: 3px solid #00cc33;
    font-size: 20px;
    font-weight: 600;
    line-height: 1.2;
    color: #00cc33;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;

# H3 样式
h3:
  style: |
    margin: 2em 8px 0.75em 0px;
    padding: 0px 0px 0.4em 12px;
    border-left: 3px solid #00aa22;
    font-size: 18px;
    font-weight: 600;
    line-height: 1.2;
    color: #00cc33;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;

# H4 样式
h4:
  style: |
    margin: 1.5em 8px 0.5em 0px;
    padding-left: 12px;
    border-left: 3px solid #009918;
    font-size: 16px;
    font-weight: 600;
    line-height: 1.2;
    color: #00bb2a;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;

# H5 样式
h5:
  style: |
    margin: 1.2em 8px 0.4em 0px;
    padding-left: 8px;
    border-left: 2px solid #009918;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.2;
    color: #00aa22;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;

# H6 样式
h6:
  style: |
    margin: 1em 8px 0.3em 0px;
    padding-left: 6px;
    border-left: 2px solid #008815;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.2;
    color: #009918;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;

# 段落样式
paragraph:
  style: |
    margin: 1.2em 8px;
    text-align: left;
    line-height: 1.7;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;
    font-size: 15px;
    letter-spacing: 0.02em;
    color: #b0c4b1;
    overflow-wrap: break-word;

# 列表样式
list:
  container_style: |
    list-style: none;
    margin: 0em 8px 1.5em;
    padding: 0px;
    text-align: left;
    line-height: 1.7;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;
    font-size: 15px;
    color: #b0c4b1;

  item_style: |
    margin: 0.4em 0px;
    padding: 0px;
    text-align: left;
    line-height: 1.7;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;
    font-size: 15px;
    color: #b0c4b1;

  ul_prefix: "> "
  ol_prefix: "{n}. "

# 代码块样式
code_block:
  style: |
    margin: 1.5em 8px;
    padding: 1.2em;
    background-color: #0d0d1a;
    border-radius: 4px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.5;

  code_inner_style: |
    background: none;
    padding: 0;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;
    font-size: 14px;
    color: #00ff41;
    line-height: 1.5;

# 内联代码样式
inline_code:
  style: |
    background-color: #0d0d1a;
    color: #00ff41;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;
    padding: 3px 6px;
    border-radius: 3px;
    font-size: 90%;

# 引用样式
blockquote:
  style: |
    margin: 1.5em 0 2em;
    padding: 1em 1em 1em 2em;
    border-left: 3px solid #006622;
    border-radius: 4px;
    background: #121225;
    color: #8aab8b;
    font-style: normal;

  p_inner_style: |
    margin: 0px;
    text-align: left;
    line-height: 1.7;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;
    font-size: 1em;
    display: block;
    color: #8aab8b;
    font-style: normal;

# 链接样式
link:
  style: |
    color: #00d4ff;
    text-decoration: none;
    border-bottom: 1px solid rgba(0, 212, 255, 0.3);

# 图片样式
image:
  container_style: |
    margin: 1.5em 0;
    text-align: center;
    line-height: 1.7;
    font-size: 14px;
    color: #6a8a6b;

  img_style: |
    display: block;
    max-width: 100%;
    margin: 0.1em auto 0.5em;
    border-radius: 4px;
    box-shadow: 0 0 15px rgba(0, 255, 65, 0.1);

# 表格样式
table:
  style: |
    margin: 1.5em 0;
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;

  th_style: |
    background: #0d0d1a;
    color: #00ff41;
    padding: 10px;
    text-align: left;
    font-weight: 600;
    border: 1px solid #00661a;

  td_style: |
    border: 1px solid #1a3a1a;
    padding: 10px;
    color: #b0c4b1;
    background: #121225;

# 分隔线样式
hr:
  style: |
    border: none;
    height: 1px;
    margin: 2em 0px;
    border-top: 1px dashed #00cc33;
    background: transparent;

# 粗体样式
bold:
  style: |
    font-weight: bold;
    color: #00ff41;

# 斜体样式
italic:
  style: |
    font-style: italic;
    color: #6a9a6b;

# 删除线样式
strikethrough:
  style: |
    text-decoration: line-through;
    color: #4a6a4b;

# 对话样式
dialogue:
  container_style: |
    margin: 2em 0;
    padding: 20px;
    background: #121225;
    border-radius: 8px;
    border: 1px solid #1a3a1a;

  title_style: |
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
    color: #00ff41;
    text-align: center;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;

  message_style: |
    display: flex;
    margin-bottom: 16px;
    align-items: flex-start;

  bubble_left_style: |
    background: #0d0d1a;
    color: #b0c4b1;
    padding: 10px 14px;
    border-radius: 8px;
    max-width: 65%;
    word-wrap: break-word;
    border: 1px solid #1a3a1a;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;

  bubble_right_style: |
    background: #003311;
    color: #00ff41;
    padding: 10px 14px;
    border-radius: 8px;
    max-width: 65%;
    word-wrap: break-word;
    border: 1px solid #00661a;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;

  avatar_style: |
    width: 40px;
    height: 40px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 14px;
    flex-shrink: 0;
    margin: 0 12px;
    font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;

  avatar_left_style: |
    background: #0d0d1a;
    color: #00cc33;
    border: 1px solid #1a3a1a;

  avatar_right_style: |
    background: #003311;
    color: #00ff41;
    border: 1px solid #00661a;

# 页面背景
body:
  background: "#0a0a1a"
  padding: "16px"
  margin: "0"

# 装饰配置
decorations:
  h1_prefix: "> _ "
  h2_prefix: "$ "
  ul_prefix: "> "
