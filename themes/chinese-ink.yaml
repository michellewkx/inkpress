# 水墨丹青 - 传统中国水墨画风格
# 以宣纸底色、墨色浓淡、朱砂点缀为核心，营造文人书房的雅致氛围

name: "水墨丹青"
description: "传统中国水墨画风格，宣纸质感配以墨色层次与朱砂点缀，清雅脱俗"
series: "oriental"
tags: ["中国风", "水墨", "文艺"]

# 容器样式 - 仿宣纸质感
container:
  max_width: "677px"
  padding: "8px"
  background: "#f8f5ef"
  border_radius: "12px"
  box_shadow: "0 2px 12px rgba(60, 40, 20, 0.06)"

# H1 样式 - 墨色渐变底衬，朱砂红字，居中大气
h1:
  style: |
    padding: 1em 2em;
    margin: 2em 0 1.2em;
    background: linear-gradient(135deg, #f5f0e8 0%, #ece4d4 50%, #f5f0e8 100%);
    font-size: 24px;
    font-weight: bold;
    line-height: 1.3;
    color: #8b4513;
    text-align: center;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(60, 40, 20, 0.08);
    border-top: 2px solid rgba(139, 69, 19, 0.3);
    border-bottom: 2px solid rgba(139, 69, 19, 0.3);
    letter-spacing: 0.15em;

# H2 样式 - 朱砂左边框，淡墨渐变底色
h2:
  style: |
    margin: 2em 8px 0.75em 0;
    padding: 0.5em 1em 0.5em 16px;
    border-left: 4px solid #8b4513;
    font-size: 20px;
    font-weight: bold;
    line-height: 1.3;
    color: #8b4513;
    background: linear-gradient(to right, rgba(139, 69, 19, 0.06), rgba(139, 69, 19, 0.02), transparent);
    border-bottom: 1px solid rgba(139, 69, 19, 0.15);

# H3 样式 - 竹绿边框
h3:
  style: |
    margin: 2em 8px 0.75em 0;
    padding: 0.4em 0.8em 0.3em 14px;
    border-left: 4px solid #2e8b57;
    border-bottom: 1px dashed rgba(46, 139, 87, 0.3);
    font-size: 18px;
    font-weight: bold;
    line-height: 1.3;
    color: #3d5a3a;

# H4 样式 - 墨色边框
h4:
  style: |
    margin: 1.5em 8px 0.5em 0;
    padding-left: 12px;
    font-size: 16px;
    font-weight: bold;
    line-height: 1.3;
    color: #5a4030;
    border-left: 3px solid #8b4513;

# H5 样式
h5:
  style: |
    margin: 1.2em 8px 0.4em 0;
    padding-left: 10px;
    font-size: 15px;
    font-weight: bold;
    line-height: 1.3;
    color: #6b5040;
    border-left: 2px solid #8b4513;

# H6 样式
h6:
  style: |
    margin: 1em 8px 0.3em 0;
    padding-left: 8px;
    font-size: 14px;
    font-weight: bold;
    line-height: 1.3;
    color: #7a6050;
    border-left: 1px solid #2e8b57;

# 段落样式 - 宋体/楷体风味，宽松行距，墨色文字
paragraph:
  style: |
    margin: 1.2em 8px;
    text-align: justify;
    line-height: 1.85;
    font-family: 'PingFang SC', 'STSong', 'Songti SC', 'KaiTi', serif;
    font-size: 15px;
    letter-spacing: 0.06em;
    color: #2c2420;

# 列表样式
list:
  container_style: |
    list-style: none;
    padding: 0;
    margin: 1.2em 8px;
    color: #2c2420;
    font-size: 15px;

  item_style: |
    margin: 0.5em 0;
    padding: 0;
    line-height: 1.8;
    font-size: 15px;
    color: #2c2420;

  ul_prefix: "○ "
  ol_prefix: "{n}、"

  nested_container_style: |
    list-style: none;
    padding: 0 0 0 1.5em;
    margin: 0.3em 0;
    font-size: 15px;

  nested_item_style: |
    margin: 0.3em 0;
    padding: 0;
    line-height: 1.75;
    font-size: 15px;
    color: #2c2420;

  nested_ul_prefix: "◦ "

# 代码块样式 - 温暖底色，朱砂顶部边线
code_block:
  style: |
    margin: 1.5em 8px;
    padding: 1.2em;
    background-color: #f5f1ea;
    border-radius: 4px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.5;
    border: 1px solid #e5dcd0;
    border-top: 3px solid #8b4513;

  code_inner_style: |
    background: none;
    padding: 0;
    font-family: 'Courier New', Menlo, monospace;
    font-size: 14px;
    color: #3a3028;
    line-height: 1.5;

# 内联代码样式 - 朱砂色文字，暖色背景
inline_code:
  style: |
    background-color: rgba(139, 69, 19, 0.08);
    color: #8b4513;
    font-family: 'Courier New', Menlo, monospace;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 90%;
    border: 1px solid rgba(139, 69, 19, 0.12);

# 引用样式 - 竹绿左边框，宣纸底色
blockquote:
  style: |
    margin: 1.5em 0 2em;
    padding: 1em 1.5em;
    border-left: 4px solid #2e8b57;
    background: #f5f2eb;
    color: #4a4035;
    border-radius: 4px;
    box-shadow: 0 1px 4px rgba(60, 40, 20, 0.05);

  p_inner_style: |
    margin: 0;
    color: #4a4035;
    line-height: 1.8;
    font-style: normal;
    font-size: 15px;

# 链接样式 - 朱砂红
link:
  style: |
    color: #8b4513;
    text-decoration: none;
    border-bottom: 1px dashed rgba(139, 69, 19, 0.4);

# 图片样式
image:
  container_style: |
    margin: 1.5em 0;
    text-align: center;

  img_style: |
    max-width: 100%;
    margin: 1em auto;
    display: block;
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(60, 40, 20, 0.1);
    border: 1px solid #e5dcd0;


  caption_style: |
    text-align: center;
    font-size: 0.85em;
    color: #8b4513;
    margin-top: 0.5em;
    font-style: italic;

# 表格样式
table:
  wrapper_style: |
    overflow-x: auto;
    margin: 1.5em 8px;

  tr_odd_style: |
    background: rgba(139, 69, 19, 0.04);

  style: |
    margin: 1.5em 0;
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;

  th_style: |
    background: #8b4513;
    color: #ffffff;
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;

  td_style: |
    border: 1px solid #e5dcd0;
    padding: 10px 14px;
    color: #2c2420;
    background: #faf7f2;

# 分隔线样式 - 留空，使用 hr_text 装饰
hr:
  style: ""

# 粗体样式 - 朱砂红色
bold:
  style: |
    font-weight: bold;
    color: #8b4513;

# 斜体样式 - 竹绿色
italic:
  style: |
    font-style: italic;
    color: #2e8b57;

# 删除线样式
strikethrough:
  style: |
    text-decoration: line-through;
    color: #999999;

# 对话样式 - 暖色土系
dialogue:
  container_style: |
    margin: 2em 0;
    padding: 20px;
    background: linear-gradient(to bottom, #f8f5ef, #f3efe6);
    border-radius: 8px;
    border: 1px solid #e5dcd0;
    box-shadow: 0 2px 8px rgba(60, 40, 20, 0.05);

  title_style: |
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
    color: #8b4513;
    text-align: center;
    letter-spacing: 0.1em;

  message_style: |
    display: flex;
    margin-bottom: 16px;
    align-items: flex-start;

  bubble_left_style: |
    background: #faf7f2;
    color: #4a4035;
    padding: 12px 16px;
    border-radius: 12px;
    max-width: 65%;
    word-wrap: break-word;
    border: 1px solid #e5dcd0;

  bubble_right_style: |
    background: linear-gradient(135deg, #8b4513, #a0522d);
    color: #ffffff;
    padding: 12px 16px;
    border-radius: 12px;
    max-width: 65%;
    word-wrap: break-word;
    box-shadow: 0 2px 6px rgba(139, 69, 19, 0.2);

  avatar_style: |
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 14px;
    flex-shrink: 0;
    margin: 0 12px;

  avatar_left_style: |
    background: #e5dcd0;
    color: #2e8b57;
    border: 2px solid #d5cab8;

  avatar_right_style: |
    background: linear-gradient(135deg, #8b4513, #a0522d);
    color: #ffffff;

# 页面背景
body:
  background: "#f0ece4"
  padding: "16px"
  margin: "0"

# 装饰配置
decorations:
  h2_prefix: "◈ "
  ul_prefix: "○ "
  hr_text: "— · —"

# 脚注样式
footnote:
  sup_style: |
    font-size: 0.75em;
    line-height: 0;
    vertical-align: super;
    margin: 0;
    padding: 0;
  ref_style: |
    color: inherit;
    text-decoration: none;
    border-bottom: 1px dashed #8b4513;
    padding-bottom: 1px;
  section_style: |
    margin-top: 2.5em;
    padding-top: 1.8em;
    border-top: 1px solid #d8c9a8;
  list_style: |
    list-style-type: decimal;
    margin: 0;
    padding-left: 1.5em;
  item_style: |
    font-size: 0.85em;
    color: #8b8378;
    line-height: 1.6;
    margin-bottom: 0.3em;
  backref_style: |
    color: #8b4513;
    text-decoration: none;
    margin-left: 0.3em;

# GFM 提示框样式
gfm_alert:
  container_style: |
    margin: 1.5em 8px;
    padding: 12px 16px;
    border-radius: 4px;
  title_style: |
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  content_style: |
    color: #2c2420;
    line-height: 1.6;
    font-size: 14px;
  note_color: "#8b4513"
  tip_color: "#2e8b57"
  important_color: "#b8860b"
  warning_color: "#a0522d"
  caution_color: "#cd853f"

# 图片说明样式
