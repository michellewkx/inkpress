# Mono theme
# 瑞士国际主义排版，极致留白，字体即设计

name: "纯净极简"
description: "瑞士国际主义排版，极致留白，字体即设计"
series: "classic"
tags: ["极简", "黑白", "留白", "排版"]

# 容器样式
container:
  max_width: "677px"
  padding: "32px 28px"
  background: "#ffffff"
  border_radius: "0"
  box_shadow: "none"

# H1 样式
h1:
  style: |
    padding: 0;
    margin: 3em 0 1.5em;
    font-size: 32px;
    font-weight: 300;
    line-height: 1.2;
    color: #000;
    text-align: left;
    letter-spacing: -0.02em;
    font-family: Georgia, 'Noto Serif', 'Times New Roman', serif;

# H2 样式
h2:
  style: |
    margin: 3em 0 1em;
    padding: 0;
    font-size: 20px;
    font-weight: 800;
    line-height: 1.3;
    color: #000;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;

# H3 样式
h3:
  style: |
    margin: 2.5em 0 0.8em;
    padding: 0;
    font-size: 16px;
    font-weight: 400;
    line-height: 1.5;
    color: #000;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;

# H4 样式
h4:
  style: |
    margin: 1.8em 0 0.5em;
    padding: 0;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.4;
    color: #333;
    font-family: 'Helvetica Neue', Helvetica, sans-serif;

# H5 样式
h5:
  style: |
    margin: 1.5em 0 0.4em;
    padding: 0;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.4;
    color: #555;

# H6 样式
h6:
  style: |
    margin: 1.2em 0 0.3em;
    padding: 0;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.4;
    color: #888;

# 段落样式
paragraph:
  style: |
    margin: 1.5em 0;
    letter-spacing: 0.01em;
    color: #222;
    text-align: justify;
    line-height: 2;
    font-size: 15.5px;
    font-family: Georgia, 'Noto Serif', 'PingFang SC', serif;

# 列表样式
list:
  container_style: |
    list-style: none;
    padding: 0;
    margin: 1.5em 0;
    color: #222;
    font-size: 15px;
    font-family: Georgia, 'Noto Serif', serif;

  item_style: |
    margin: 0.6em 0;
    padding: 0;
    line-height: 1.9;
    font-size: 15px;

  ul_prefix: "— "
  ol_prefix: "{n}. "

# 代码块样式
code_block:
  style: |
    margin: 2em 0;
    padding: 1.5em;
    background: #fafafa;
    border-radius: 0;
    overflow-x: auto;
    font-size: 13.5px;
    line-height: 1.7;
    border-left: 2px solid #000;

  code_inner_style: |
    background: none;
    padding: 0;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    font-size: 13.5px;
    line-height: 1.7;
    color: #333;

# 内联代码样式
inline_code:
  style: |
    font-size: 88%;
    color: #000;
    background: #f5f5f5;
    padding: 3px 7px;
    border-radius: 0;
    font-family: 'SFMono-Regular', Consolas, monospace;
    border-bottom: 1px solid #ccc;

# 引用样式
blockquote:
  style: |
    margin: 2em 0;
    padding: 0 0 0 2em;
    border-left: 1px solid #000;
    background: transparent;
    color: #444;

  p_inner_style: |
    margin: 0;
    color: #444;
    line-height: 2;
    font-style: italic;
    font-family: Georgia, 'Noto Serif', serif;
    font-size: 16px;

# 链接样式
link:
  style: |
    color: #000;
    text-decoration: none;
    border-bottom: 1px solid #000;

# 图片样式
image:
  container_style: |
    margin: 2.5em 0;
    text-align: center;

  img_style: |
    max-width: 100%;
    margin: 1em auto;
    display: block;
    border-radius: 0;

# 表格样式
table:
  style: |
    margin: 2em 0;
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    font-family: 'Helvetica Neue', Helvetica, sans-serif;

  th_style: |
    background: transparent;
    color: #000;
    padding: 12px 14px;
    text-align: left;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 2px solid #000;
    font-size: 12px;

  td_style: |
    border-bottom: 1px solid #e0e0e0;
    padding: 12px 14px;
    color: #333;

# 分隔线样式
hr:
  style: |
    border: none;
    height: 0;
    margin: 3.5em auto;
    width: 30px;
    border-top: 2px solid #000;

# 粗体样式
bold:
  style: |
    font-weight: 800;
    color: #000;

# 斜体样式
italic:
  style: |
    font-style: italic;
    color: #444;
    font-family: Georgia, 'Noto Serif', serif;

# 删除线样式
strikethrough:
  style: |
    text-decoration: line-through;
    color: #bbb;

# 页面背景
body:
  background: "#ffffff"
  padding: "20px"

# 装饰配置
decorations: {}
