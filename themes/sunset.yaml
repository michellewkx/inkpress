# Sunset theme
# 日落渐变色系，从金橙到玫瑰紫

name: "暮色"
description: "日落渐变色系，从金橙到玫瑰紫，温暖有力量"
series: "classic"
tags: ["日落", "渐变", "温暖"]

# 容器样式
container:
  max_width: "677px"
  padding: "16px"
  background: "#fdf6f0"
  border_radius: "14px"
  box_shadow: "0 4px 18px rgba(231, 76, 60, 0.08)"

# H1 样式 - 日落渐变背景
h1:
  style: |
    margin: 1.8em 8px 1em;
    padding: 1em 1.8em;
    font-size: 22px;
    font-weight: 800;
    line-height: 1.3;
    color: #ffffff;
    text-align: center;
    background: linear-gradient(135deg, #f39c12, #e74c3c, #8e44ad);
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(231, 76, 60, 0.25);
    letter-spacing: 0.06em;
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.15);

# H2 样式 - 珊瑚左边框
h2:
  style: |
    margin: 2em 8px 0.75em;
    padding: 0px 0px 0.5em 14px;
    border-left: 4px solid #e74c3c;
    border-bottom: 1px dashed rgba(231, 76, 60, 0.35);
    font-size: 20px;
    font-weight: 700;
    line-height: 1.3;
    color: #5b2c6f;

# H3 样式
h3:
  style: |
    margin: 1.8em 8px 0.6em;
    padding: 0px 0px 0.4em 12px;
    border-left: 4px solid #f39c12;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
    color: #7d3c98;

# H4 样式
h4:
  style: |
    margin: 1.5em 8px 0.5em;
    padding-left: 12px;
    border-left: 3px solid #e67e22;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
    color: #8e44ad;

# H5 样式
h5:
  style: |
    margin: 1.2em 8px 0.4em;
    padding-left: 10px;
    border-left: 3px solid #f5b041;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
    color: #a04000;

# H6 样式
h6:
  style: |
    margin: 1em 8px 0.3em;
    padding-left: 8px;
    border-left: 2px solid #f5cba7;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
    color: #b03a2e;

# 段落样式
paragraph:
  style: |
    margin: 1.2em 8px;
    color: #2d2d2d;
    font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 15px;
    line-height: 1.75;
    letter-spacing: 0.06em;
    text-align: justify;

# 列表样式
list:
  container_style: |
    list-style: none;
    padding: 0;
    margin: 1.2em 8px;
    color: #2d2d2d;
    font-size: 15px;

  item_style: |
    margin: 0.5em 0;
    padding: 0;
    line-height: 1.75;
    font-size: 15px;
    color: #2d2d2d;

  ul_prefix: "• "
  ol_prefix: "{n}. "

# 代码块样式
code_block:
  style: |
    margin: 1.5em 8px;
    padding: 1.2em;
    background-color: #fef9e7;
    border-top: 3px solid #f39c12;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.5;

  code_inner_style: |
    background: none;
    padding: 0;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    font-size: 14px;
    color: #2d2d2d;
    line-height: 1.5;

# 内联代码样式
inline_code:
  style: |
    font-size: 90%;
    color: #e74c3c;
    background-color: rgba(243, 156, 18, 0.1);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;

# 引用样式 - 金色左边框
blockquote:
  style: |
    margin: 1.5em 8px;
    padding: 1em 1em 1em 1.5em;
    border-left: 4px solid #f39c12;
    border-radius: 6px;
    background-color: #fef5e7;
    color: #6e2c00;

  p_inner_style: |
    margin: 0;
    color: #6e2c00;
    line-height: 1.75;
    font-style: normal;

# 链接样式
link:
  style: |
    color: #e74c3c;
    text-decoration: none;
    border-bottom: 1px solid rgba(231, 76, 60, 0.35);

# 图片样式
image:
  container_style: |
    margin: 1.5em 0;
    text-align: center;
    line-height: 1.6;
    font-size: 14px;
    color: #a04000;

  img_style: |
    max-width: 100%;
    display: block;
    margin: 0.5em auto;
    border-radius: 8px;
    box-shadow: 0 3px 12px rgba(231, 76, 60, 0.12);

# 表格样式
table:
  style: |
    width: 100%;
    border-collapse: collapse;
    margin: 1.5em 0;
    font-size: 14px;
    overflow: hidden;

  th_style: |
    padding: 10px 14px;
    text-align: left;
    font-weight: 700;
    color: #ffffff;
    background: linear-gradient(135deg, #e74c3c, #8e44ad);
    border: 1px solid #c0392b;

  td_style: |
    padding: 8px 14px;
    border: 1px solid #f5cba7;
    color: #2d2d2d;
    background-color: #ffffff;

# 分隔线样式 - 日落渐变
hr:
  style: |
    border: none;
    height: 2px;
    margin: 2em 0;
    background: linear-gradient(to right, transparent, #f39c12, #e74c3c, #8e44ad, transparent);
    border-radius: 2px;

# 粗体样式
bold:
  style: |
    font-weight: 700;
    color: #e74c3c;

# 斜体样式
italic:
  style: |
    font-style: italic;
    color: #8e44ad;

# 删除线样式
strikethrough:
  style: |
    text-decoration: line-through;
    color: #bfc9ca;

# 对话样式
dialogue:
  container_style: |
    margin: 2em 0;
    padding: 18px;
    background-color: #fef5e7;
    border-radius: 12px;
    border: 1px solid #f5cba7;

  title_style: |
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 14px;
    color: #8e44ad;
    text-align: center;

  message_style: |
    display: flex;
    margin-bottom: 14px;
    align-items: flex-start;

  bubble_left_style: |
    background-color: #ffffff;
    color: #2d2d2d;
    padding: 10px 14px;
    border-radius: 10px;
    max-width: 65%;
    word-wrap: break-word;
    border: 1px solid #f5cba7;

  bubble_right_style: |
    background: linear-gradient(135deg, #f39c12, #e74c3c);
    color: #ffffff;
    padding: 10px 14px;
    border-radius: 10px;
    max-width: 65%;
    word-wrap: break-word;
    box-shadow: 0 2px 8px rgba(231, 76, 60, 0.3);

  avatar_style: |
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
    margin: 0 10px;

  avatar_left_style: |
    background-color: #fef5e7;
    color: #e74c3c;
    border: 1px solid #f5cba7;

  avatar_right_style: |
    background: linear-gradient(135deg, #f39c12, #e74c3c);
    color: #ffffff;

# 页面背景
body:
  background: "#fae5d3"
  padding: "16px"
  margin: "0"

# 装饰配置
decorations: {}
