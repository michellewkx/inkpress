# 小红书风格 - XiaoHongShu / Little Red Book
# 粉红色系，年轻活泼，种草笔记感

name: "小红书"
description: "小红书种草风格，粉红色系，活泼年轻有趣"
series: "social"
tags: ["小红书", "种草", "年轻"]

# 容器样式 - 圆角，粉色阴影
container:
  max_width: "677px"
  padding: "16px"
  background: "#ffffff"
  border_radius: "16px"
  box_shadow: "0 4px 20px rgba(255, 36, 66, 0.08)"

# H1 样式 - 粉红渐变背景，白色文字，活泼圆角
h1:
  style: |
    padding: 0.8em 1.5em;
    margin: 1.4em 0 1em;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.05em;
    line-height: 1.3;
    background: linear-gradient(135deg, #ff2442 0%, #ff6b81 100%);
    color: #ffffff;
    border-radius: 20px;
    box-shadow: 0 4px 16px rgba(255, 36, 66, 0.25);

# H2 样式 - 粉红色文字
h2:
  style: |
    margin: 2em 0 0.8em;
    padding: 0;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.3;
    color: #ff2442;

# H3 样式
h3:
  style: |
    margin: 1.8em 0 0.6em;
    padding: 0;
    font-size: 18px;
    font-weight: 600;
    line-height: 1.3;
    color: #ff2442;

# H4 样式
h4:
  style: |
    margin: 1.5em 0 0.5em;
    padding: 0;
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
    color: #ff4d6a;

# H5 样式
h5:
  style: |
    margin: 1.2em 0 0.4em;
    padding: 0;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    color: #ff4d6a;

# H6 样式
h6:
  style: |
    margin: 1em 0 0.3em;
    padding: 0;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
    color: #ff6b81;

# 段落样式 - 宽行距，微妙字距
paragraph:
  style: |
    margin: 1.2em 0;
    color: #333333;
    font-size: 15px;
    line-height: 2.0;
    letter-spacing: 0.05em;

# 列表样式
list:
  container_style: |
    list-style: none;
    padding: 0;
    margin: 1.2em 0;
    color: #333333;
    font-size: 15px;

  item_style: |
    margin: 0.5em 0;
    padding: 0;
    line-height: 1.9;
    font-size: 15px;
    letter-spacing: 0.05em;

  ul_prefix: "💕 "
  ol_prefix: "{n}. "

# 代码块样式 - 粉色调浅底
code_block:
  style: |
    margin: 1.5em 0;
    padding: 1.2em;
    background-color: #fff5f7;
    border-radius: 12px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.5;
    border: 1px solid #ffe0e6;

  code_inner_style: |
    background: none;
    padding: 0;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    font-size: 14px;
    color: #333333;
    line-height: 1.5;

# 内联代码样式 - 粉色文字，浅粉底
inline_code:
  style: |
    font-size: 90%;
    color: #ff2442;
    background-color: #fff0f3;
    padding: 2px 6px;
    border-radius: 6px;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;

# 引用样式 - 粉色背景，粉色左边框
blockquote:
  style: |
    margin: 1.5em 0;
    padding: 1em 1.2em;
    border-left: 4px solid #ff2442;
    background-color: #fff0f3;
    border-radius: 12px;

  p_inner_style: |
    margin: 0;
    color: #555555;
    line-height: 1.9;
    font-style: normal;
    letter-spacing: 0.05em;

# 链接样式 - 粉红色
link:
  style: |
    color: #ff2442;
    text-decoration: none;
    border-bottom: 1px solid rgba(255, 36, 66, 0.3);

# 图片样式 - 圆角，粉色阴影
image:
  container_style: |
    margin: 1.5em 0;
    text-align: center;
    line-height: 1.6;
    font-size: 14px;
    color: #ff6b81;

  img_style: |
    max-width: 100%;
    display: block;
    margin: 1.5em auto;
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(255, 36, 66, 0.12);

# 表格样式
table:
  style: |
    width: 100%;
    border-collapse: collapse;
    margin: 1.5em 0;
    font-size: 15px;
    border-radius: 12px;
    overflow: hidden;

  th_style: |
    padding: 12px 15px;
    text-align: left;
    font-weight: 600;
    color: #ffffff;
    background: linear-gradient(135deg, #ff2442, #ff6b81);

  td_style: |
    padding: 10px 15px;
    border-bottom: 1px solid #ffe0e6;
    color: #333333;

# 分隔线样式 - 粉色渐变
hr:
  style: |
    border: none;
    height: 2px;
    margin: 2em 0;
    background: linear-gradient(to right, transparent, #ff2442, #ff6b81, transparent);

# 粗体样式 - 粉红色
bold:
  style: |
    font-weight: 700;
    color: #ff2442;

# 斜体样式
italic:
  style: |
    font-style: italic;
    color: #ff6b81;

# 删除线样式
strikethrough:
  style: |
    text-decoration: line-through;
    color: #cccccc;

# 对话样式
dialogue:
  container_style: |
    margin: 2em 0;
    padding: 20px;
    background-color: #fff5f7;
    border-radius: 20px;
    border: 1px solid #ffe0e6;

  title_style: |
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    color: #ff2442;
    text-align: center;

  message_style: |
    display: flex;
    margin-bottom: 16px;
    align-items: flex-start;

  bubble_left_style: |
    background-color: #ffffff;
    color: #333333;
    padding: 10px 14px;
    border-radius: 16px;
    max-width: 65%;
    word-wrap: break-word;
    border: 1px solid #ffe0e6;

  bubble_right_style: |
    background: linear-gradient(135deg, #ff2442, #ff6b81);
    color: #ffffff;
    padding: 10px 14px;
    border-radius: 16px;
    max-width: 65%;
    word-wrap: break-word;
    box-shadow: 0 2px 8px rgba(255, 36, 66, 0.2);

  avatar_style: |
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 14px;
    flex-shrink: 0;
    margin: 0 12px;

  avatar_left_style: |
    background-color: #fff0f3;
    color: #ff2442;
    border: 1px solid #ffe0e6;

  avatar_right_style: |
    background: linear-gradient(135deg, #ff2442, #ff6b81);
    color: #ffffff;
    box-shadow: 0 2px 8px rgba(255, 36, 66, 0.3);

# 装饰配置
decorations:
  h2_prefix: "✨ "
  blockquote_prefix: ""
  blockquote_suffix: ""
  hr_text: ""

# 页面背景
body:
  background: "#fff5f5"
  padding: "16px"
  margin: "0"
