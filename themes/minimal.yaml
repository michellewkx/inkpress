# 极简风格 - Ultra-Minimal Clean
# 没有任何多余装饰，纯粹简洁

name: "极简"
description: "超级极简风格，无阴影无装饰，纯净阅读体验"
series: "classic"
tags: ["极简", "干净", "通用"]

# 容器样式
container:
  max_width: "677px"
  padding: "16px"
  background: "#ffffff"
  border_radius: "0px"
  box_shadow: ""

# H1 样式 - 纯粹加粗，无装饰
h1:
  style: |
    margin: 1.8em 0 0.8em;
    padding: 0;
    font-size: 24px;
    font-weight: 700;
    line-height: 1.3;
    color: #000000;

# H2 样式
h2:
  style: |
    margin: 2em 0 0.7em;
    padding: 0;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.3;
    color: #000000;

# H3 样式
h3:
  style: |
    margin: 1.8em 0 0.6em;
    padding: 0;
    font-size: 18px;
    font-weight: 600;
    line-height: 1.3;
    color: #1a1a1a;

# H4 样式
h4:
  style: |
    margin: 1.5em 0 0.5em;
    padding: 0;
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
    color: #1a1a1a;

# H5 样式
h5:
  style: |
    margin: 1.2em 0 0.4em;
    padding: 0;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    color: #333333;

# H6 样式
h6:
  style: |
    margin: 1em 0 0.3em;
    padding: 0;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
    color: #666666;

# 段落样式 - 系统字体
paragraph:
  style: |
    margin: 1.2em 0;
    color: #333333;
    font-size: 15px;
    line-height: 1.75;

# 列表样式
list:
  container_style: |
    list-style: none;
    padding: 0;
    margin: 1.2em 0;
    color: #333333;
    font-size: 15px;

  item_style: |
    margin: 0.4em 0;
    padding: 0;
    line-height: 1.75;
    font-size: 15px;

  ul_prefix: "- "
  ol_prefix: "{n}. "

# 代码块样式 - GitHub 风格浅灰
code_block:
  style: |
    margin: 1.5em 0;
    padding: 1em;
    background-color: #f6f8fa;
    border-radius: 6px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.5;
    border: 1px solid #e1e4e8;

  code_inner_style: |
    background: none;
    padding: 0;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 14px;
    color: #24292e;
    line-height: 1.5;

# 内联代码样式 - GitHub 风格
inline_code:
  style: |
    font-size: 90%;
    color: #24292e;
    background-color: #f6f8fa;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    border: 1px solid #e1e4e8;

# 引用样式 - 薄灰左边框，无背景
blockquote:
  style: |
    margin: 1.5em 0;
    padding: 0.5em 1em;
    border-left: 3px solid #dddddd;
    color: #666666;

  p_inner_style: |
    margin: 0;
    color: #666666;
    line-height: 1.75;
    font-style: normal;

# 链接样式 - 蓝色
link:
  style: |
    color: #0366d6;
    text-decoration: none;

# 图片样式
image:
  container_style: |
    margin: 1.5em 0;
    text-align: center;

  img_style: |
    max-width: 100%;
    display: block;
    margin: 1em auto;

# 表格样式 - 简洁线框
table:
  style: |
    width: 100%;
    border-collapse: collapse;
    margin: 1.5em 0;
    font-size: 15px;

  th_style: |
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    color: #24292e;
    border-bottom: 2px solid #e1e4e8;

  td_style: |
    padding: 8px 12px;
    border-bottom: 1px solid #e1e4e8;
    color: #333333;

# 分隔线样式 - 浅灰细线
hr:
  style: |
    border: none;
    height: 1px;
    margin: 2em 0;
    background-color: #e1e4e8;

# 粗体样式
bold:
  style: |
    font-weight: 700;
    color: #000000;

# 斜体样式
italic:
  style: |
    font-style: italic;
    color: #666666;

# 删除线样式
strikethrough:
  style: |
    text-decoration: line-through;
    color: #999999;

# 对话样式
dialogue:
  container_style: |
    margin: 2em 0;
    padding: 16px;
    background-color: #f6f8fa;
    border-radius: 6px;
    border: 1px solid #e1e4e8;

  title_style: |
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
    color: #24292e;
    text-align: center;

  message_style: |
    display: flex;
    margin-bottom: 12px;
    align-items: flex-start;

  bubble_left_style: |
    background-color: #ffffff;
    color: #333333;
    padding: 8px 12px;
    border-radius: 8px;
    max-width: 65%;
    word-wrap: break-word;
    border: 1px solid #e1e4e8;

  bubble_right_style: |
    background-color: #0366d6;
    color: #ffffff;
    padding: 8px 12px;
    border-radius: 8px;
    max-width: 65%;
    word-wrap: break-word;

  avatar_style: |
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 13px;
    flex-shrink: 0;
    margin: 0 10px;

  avatar_left_style: |
    background-color: #e1e4e8;
    color: #24292e;

  avatar_right_style: |
    background-color: #0366d6;
    color: #ffffff;

# 装饰配置
decorations:
  h2_prefix: ""
  blockquote_prefix: ""
  blockquote_suffix: ""
  hr_text: ""

# 页面背景
body:
  background: "#ffffff"
  padding: "16px"
  margin: "0"
