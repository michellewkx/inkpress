# Editorial theme
# 高端社论排版，墨蓝琥珀配色，荧光笔标注

name: "编辑精选"
description: "高端社论排版，墨蓝琥珀配色，荧光笔标注"
series: "magazine"
tags: ["社论", "墨蓝", "琥珀", "高端"]

# 容器样式
container:
  max_width: "677px"
  padding: "28px 24px"
  background: "#fffdf8"
  border_radius: "0"
  box_shadow: "none"

# H1 样式
h1:
  style: |
    padding: 0;
    margin: 2em 0 1.5em;
    font-size: 28px;
    font-weight: 900;
    line-height: 1.35;
    color: #1a202c;
    text-align: center;
    letter-spacing: 0.03em;
    font-family: Georgia, 'Noto Serif CJK SC', 'Source Han Serif SC', 'PingFang SC', serif;

# H2 样式
h2:
  style: |
    margin: 2.8em 0 1.2em;
    padding: 0.6em 0;
    font-size: 20px;
    font-weight: 800;
    line-height: 1.4;
    color: #1a365d;
    text-align: center;
    border-top: 2px solid #1a365d;
    border-bottom: 2px solid #1a365d;
    letter-spacing: 0.06em;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;

# H3 样式
h3:
  style: |
    margin: 2em 0 0.8em;
    padding: 0.1em 0;
    font-size: 17px;
    font-weight: 800;
    line-height: 1.6;
    color: #1a202c;
    background: linear-gradient(transparent 60%, rgba(245, 158, 11, 0.28) 60%);
    display: inline-block;
    letter-spacing: 0.03em;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;

# H4 样式
h4:
  style: |
    margin: 1.5em 0 0.5em;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.4;
    color: #1a365d;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;

# H5 样式
h5:
  style: |
    margin: 1.2em 0 0.4em;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.4;
    color: #2d4a7a;

# H6 样式
h6:
  style: |
    margin: 1em 0 0.3em;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.4;
    color: #64748b;

# 段落样式
paragraph:
  style: |
    margin: 1.4em 0;
    letter-spacing: 0.04em;
    color: #1a202c;
    text-align: justify;
    line-height: 2;
    font-size: 15.5px;
    font-family: Georgia, 'Noto Serif CJK SC', 'Source Han Serif SC', 'PingFang SC', serif;

# 列表样式
list:
  container_style: |
    list-style: none;
    padding: 0;
    margin: 1.3em 0;
    color: #1a202c;
    font-size: 15px;
    font-family: Georgia, 'Noto Serif CJK SC', 'PingFang SC', serif;

  item_style: |
    margin: 0.6em 0;
    padding: 0;
    line-height: 1.9;
    font-size: 15px;

  ul_prefix: "▪ "
  ol_prefix: "{n}. "

  nested_container_style: |
    list-style: none;
    padding: 0 0 0 1.5em;
    margin: 0.3em 0;
    font-size: 15px;

  nested_item_style: |
    margin: 0.3em 0;
    padding: 0;
    line-height: 1.75;
    font-size: 15px;
    color: #1a202c;

  nested_ul_prefix: "◦ "

# 代码块样式
code_block:
  style: |
    margin: 1.8em 0;
    padding: 1.2em 1.5em;
    background: #f7f5ef;
    border-radius: 0;
    overflow-x: auto;
    font-size: 13.5px;
    line-height: 1.7;
    border-left: 3px solid #1a365d;
    border-top: 1px solid #e8e4da;
    border-bottom: 1px solid #e8e4da;

  code_inner_style: |
    background: none;
    padding: 0;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    font-size: 13.5px;
    color: #1a365d;
    line-height: 1.7;

# 内联代码样式
inline_code:
  style: |
    font-size: 88%;
    color: #1a365d;
    background: rgba(26, 54, 93, 0.06);
    padding: 2px 7px;
    border-radius: 3px;
    font-family: 'SFMono-Regular', Consolas, monospace;
    border: 1px solid rgba(26, 54, 93, 0.1);

# 引用样式
blockquote:
  style: |
    margin: 2em 0;
    padding: 1.2em 1.5em 1.2em 2em;
    border-left: 4px solid #f59e0b;
    background: rgba(245, 158, 11, 0.04);
    color: #374151;
    border-radius: 0;

  p_inner_style: |
    margin: 0;
    color: #374151;
    line-height: 1.9;
    font-style: normal;
    font-family: Georgia, 'Noto Serif CJK SC', 'PingFang SC', serif;
    letter-spacing: 0.03em;

# 链接样式
link:
  style: |
    color: #1a365d;
    text-decoration: none;
    border-bottom: 1px solid rgba(26, 54, 93, 0.3);
    font-weight: 600;

# 图片样式
image:
  container_style: |
    margin: 2em 0;
    text-align: center;

  img_style: |
    max-width: 100%;
    margin: 1em auto;
    display: block;
    border-radius: 0;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);


  caption_style: |
    text-align: center;
    font-size: 0.85em;
    color: #718096;
    margin-top: 0.5em;
    font-style: italic;

# 表格样式
table:
  wrapper_style: |
    overflow-x: auto;
    margin: 1.5em 8px;

  tr_odd_style: |
    background: rgba(26, 54, 93, 0.04);

  style: |
    margin: 1.8em 0;
    width: 100%;
    border-collapse: collapse;
    font-size: 14.5px;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;

  th_style: |
    background: #1a365d;
    color: #fffdf8;
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    letter-spacing: 0.04em;

  td_style: |
    border-bottom: 1px solid #e8e4da;
    padding: 11px 16px;
    color: #1a202c;

# 分隔线样式
hr:
  style: |
    border: none;
    height: 2px;
    margin: 3em 0;
    background: #1a365d;

# 粗体样式
bold:
  style: |
    font-weight: 800;
    color: #1a365d;

# 斜体样式
italic:
  style: |
    font-style: italic;
    color: #64748b;
    font-family: Georgia, 'Noto Serif CJK SC', serif;

# 删除线样式
strikethrough:
  style: |
    text-decoration: line-through;
    color: #94a3b8;

# 页面背景
body:
  background: "#f8f6f0"
  padding: "20px"

# 装饰配置
decorations:
  h2_prefix: "— "

# 脚注样式
footnote:
  sup_style: |
    font-size: 0.75em;
    line-height: 0;
    vertical-align: super;
    margin: 0;
    padding: 0;
  ref_style: |
    color: inherit;
    text-decoration: none;
    border-bottom: 1px dashed #1a365d;
    padding-bottom: 1px;
  section_style: |
    margin-top: 2.5em;
    padding-top: 1.8em;
    border-top: 1px solid #e2e8f0;
  list_style: |
    list-style-type: decimal;
    margin: 0;
    padding-left: 1.5em;
  item_style: |
    font-size: 0.85em;
    color: #718096;
    line-height: 1.6;
    margin-bottom: 0.3em;
  backref_style: |
    color: #1a365d;
    text-decoration: none;
    margin-left: 0.3em;

# GFM 提示框样式
gfm_alert:
  container_style: |
    margin: 1.5em 8px;
    padding: 12px 16px;
    border-radius: 4px;
  title_style: |
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  content_style: |
    color: #1a202c;
    line-height: 1.6;
    font-size: 14px;
  note_color: "#1a365d"
  tip_color: "#2e7d32"
  important_color: "#f59e0b"
  warning_color: "#c0392b"
  caution_color: "#e67e22"

# 图片说明样式
