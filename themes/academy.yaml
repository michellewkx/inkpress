# Academy theme
# 学术衬线排版，严谨权威

name: "学院派"
description: "学术衬线排版，严谨权威，知识/研究/深度分析内容"
series: "magazine"
tags: ["学术", "衬线", "严谨"]

# 容器样式
container:
  max_width: "677px"
  padding: "28px 24px"
  background: "#fdfcfa"
  border_radius: "0"
  box_shadow: "none"
  border: "1px solid #ddd5c8"

# H1 样式
h1:
  style: |
    padding: 0;
    margin: 2em 0 0.5em;
    font-size: 28px;
    font-weight: 400;
    line-height: 1.3;
    color: #1a1a1a;
    text-align: center;
    font-family: Georgia, 'Noto Serif CJK SC', 'Source Han Serif SC', serif;
    letter-spacing: 0.03em;

# H2 样式
h2:
  style: |
    margin: 2.8em 0 1em;
    padding: 0 0 0.4em;
    font-size: 19px;
    font-weight: 700;
    line-height: 1.4;
    color: #1a1a1a;
    border-bottom: 2px solid #1a1a1a;
    font-family: Georgia, 'Noto Serif CJK SC', serif;
    letter-spacing: 0.04em;

# H3 样式
h3:
  style: |
    margin: 2em 0 0.8em;
    padding: 0;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.5;
    color: #333;
    font-family: Georgia, 'Noto Serif CJK SC', serif;
    font-style: italic;

# H4 样式
h4:
  style: |
    margin: 1.5em 0 0.5em;
    font-size: 15.5px;
    font-weight: 700;
    line-height: 1.4;
    color: #444;
    font-family: Georgia, 'Noto Serif CJK SC', serif;

# H5 样式
h5:
  style: |
    margin: 1.2em 0 0.4em;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: #555;
    font-family: Georgia, 'Noto Serif CJK SC', serif;

# H6 样式
h6:
  style: |
    margin: 1em 0 0.3em;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    color: #777;

# 段落样式
paragraph:
  style: |
    margin: 1.5em 0;
    letter-spacing: 0.03em;
    color: #2a2a2a;
    text-align: justify;
    line-height: 2.1;
    font-size: 15.5px;
    font-family: Georgia, 'Noto Serif CJK SC', 'Source Han Serif SC', 'PingFang SC', serif;
    text-indent: 2em;

# 列表样式
list:
  container_style: |
    list-style: none;
    padding: 0;
    margin: 1.3em 0;
    color: #2a2a2a;
    font-size: 15px;
    font-family: Georgia, 'Noto Serif CJK SC', serif;

  item_style: |
    margin: 0.6em 0;
    padding: 0;
    line-height: 2;
    font-size: 15px;

  ul_prefix: "• "
  ol_prefix: "{n}. "

# 代码块样式
code_block:
  style: |
    margin: 1.8em 0;
    padding: 1.2em 1.5em;
    background-color: #f5f2ec;
    border-radius: 0;
    overflow-x: auto;
    font-size: 13.5px;
    line-height: 1.7;
    border: 1px solid #ddd5c8;

  code_inner_style: |
    background: none;
    padding: 0;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    font-size: 13.5px;
    color: #333;
    line-height: 1.7;

# 内联代码样式
inline_code:
  style: |
    font-size: 88%;
    color: #8b0000;
    background-color: rgba(139, 0, 0, 0.04);
    padding: 2px 6px;
    border-radius: 2px;
    font-family: 'SFMono-Regular', Consolas, monospace;
    border-bottom: 1px solid rgba(139, 0, 0, 0.15);

# 引用样式
blockquote:
  style: |
    margin: 2em 2em;
    padding: 0 0 0 1.5em;
    border-left: 2px solid #999;
    background-color: transparent;
    color: #555;

  p_inner_style: |
    margin: 0;
    color: #555;
    line-height: 2;
    font-style: italic;
    font-family: Georgia, 'Noto Serif CJK SC', serif;
    font-size: 15px;
    text-indent: 0;

# 链接样式
link:
  style: |
    color: #8b0000;
    text-decoration: none;
    border-bottom: 1px solid rgba(139, 0, 0, 0.25);

# 图片样式
image:
  container_style: |
    margin: 2em 0;
    text-align: center;

  img_style: |
    max-width: 100%;
    margin: 1em auto;
    display: block;
    border-radius: 0;

# 表格样式
table:
  style: |
    margin: 1.8em 0;
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    font-family: Georgia, 'Noto Serif CJK SC', serif;

  th_style: |
    background-color: transparent;
    color: #1a1a1a;
    padding: 10px 14px;
    text-align: left;
    font-weight: 700;
    border-top: 2px solid #1a1a1a;
    border-bottom: 1px solid #1a1a1a;
    font-family: Georgia, 'Noto Serif CJK SC', serif;

  td_style: |
    border-bottom: 1px solid #ddd5c8;
    padding: 10px 14px;
    color: #333;

# 分隔线样式
hr:
  style: |
    border: none;
    height: 0;
    margin: 3em auto;
    width: 25%;
    border-top: 1px solid #999;

# 粗体样式
bold:
  style: |
    font-weight: 700;
    color: #1a1a1a;

# 斜体样式
italic:
  style: |
    font-style: italic;
    color: #555;
    font-family: Georgia, 'Noto Serif CJK SC', serif;

# 删除线样式
strikethrough:
  style: |
    text-decoration: line-through;
    color: #aaa;

# 页面背景
body:
  background: "#f5f2ec"
  padding: "20px"

# 装饰配置
decorations: {}
