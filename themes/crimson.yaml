# Crimson — 深红社论风格
# 灵感来自高端科技媒体排版，暖色调深红强调，严肃权威的编辑气质

name: "深红社论"
description: "暖调深红强调色，权威科技媒体排版，严肃而温暖的编辑气质"
series: "magazine"
tags: ["社论", "深红", "科技", "权威"]

# 容器
container:
  max_width: "677px"
  padding: "32px 24px"
  background: "#faf6f0"
  border_radius: "0"
  box_shadow: "none"

# H1 — 文章大标题，宋体加粗
h1:
  style: |
    padding: 0;
    margin: 1.5em 0 0.3em;
    font-size: 26px;
    font-weight: 900;
    line-height: 1.4;
    color: #1a1a18;
    letter-spacing: 0.02em;
    font-family: 'Noto Serif SC', 'Songti SC', STSong, Georgia, serif;

# H2 — 章节标题，宋体粗体，无装饰
h2:
  style: |
    margin: 2.5em 0 1em;
    padding: 0;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.4;
    color: #1a1a18;
    letter-spacing: 0.02em;
    font-family: 'Noto Serif SC', 'Songti SC', STSong, Georgia, serif;

# H3 — 小节标题，宋体
h3:
  style: |
    margin: 2em 0 0.6em;
    padding: 0;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.5;
    color: #1a1a18;
    letter-spacing: 0.01em;
    font-family: 'Noto Serif SC', 'Songti SC', STSong, Georgia, serif;

# H4
h4:
  style: |
    margin: 1.5em 0 0.5em;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.4;
    color: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;

# H5
h5:
  style: |
    margin: 1.2em 0 0.4em;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.4;
    color: #333;

# H6 — 红色大写标签体（类似 MODEL 标签）
h6:
  style: |
    margin: 1.5em 0 0.5em;
    font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.4;
    color: #cf4436;
    letter-spacing: 2px;
    text-transform: uppercase;

# 段落 — 宽松行高，两端对齐
paragraph:
  style: |
    margin: 1.4em 0;
    color: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
    font-size: 15px;
    line-height: 2;
    letter-spacing: 0.04em;
    text-align: justify;

# 列表
list:
  container_style: |
    list-style: none;
    padding: 0;
    margin: 1.2em 0;
    color: #1a1a1a;
    font-size: 15px;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;

  item_style: |
    margin: 0.5em 0;
    padding: 0;
    line-height: 2;
    font-size: 15px;

  ul_prefix: "• "
  ol_prefix: "{n}. "

  nested_container_style: |
    list-style: none;
    padding: 0 0 0 1.5em;
    margin: 0.3em 0;
    font-size: 15px;

  nested_item_style: |
    margin: 0.3em 0;
    padding: 0;
    line-height: 1.9;
    font-size: 15px;
    color: #1a1a1a;

  nested_ul_prefix: "◦ "

# 代码块 — 浅灰底 + 红色顶线
code_block:
  style: |
    margin: 1.5em 0;
    padding: 1.2em 1.5em;
    background: #f7f5f2;
    border-radius: 0;
    overflow-x: auto;
    font-size: 13.5px;
    line-height: 1.7;
    border-top: 2px solid #b5342b;

  code_inner_style: |
    background: none;
    padding: 0;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    font-size: 13.5px;
    color: #1a1a1a;
    line-height: 1.7;

# 内联代码
inline_code:
  style: |
    font-size: 88%;
    color: #b5342b;
    background: rgba(181, 52, 43, 0.06);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;

# 引用块 — 深红左边框 + 淡红背景 + 红色文字
blockquote:
  style: |
    margin: 1.8em 0;
    padding: 1em 1.2em 1em 1.5em;
    border-left: 4px solid #b5342b;
    background: rgba(181, 52, 43, 0.05);
    color: #b5342b;
    border-radius: 0;

  p_inner_style: |
    margin: 0;
    color: #b5342b;
    line-height: 1.9;
    font-style: normal;
    font-size: 15px;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    letter-spacing: 0.03em;

# 链接
link:
  style: |
    color: #b5342b;
    text-decoration: none;
    border-bottom: 1px solid rgba(181, 52, 43, 0.3);

# 图片
image:
  container_style: |
    margin: 1.8em 0;
    text-align: center;

  img_style: |
    max-width: 100%;
    margin: 0.5em auto;
    display: block;
    border-radius: 0;

  caption_style: |
    text-align: center;
    font-size: 0.85em;
    color: #999;
    margin-top: 0.5em;

# 表格
table:
  wrapper_style: |
    overflow-x: auto;
    margin: 1.5em 0;

  style: |
    margin: 1.5em 0;
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;

  th_style: |
    background: #3a3a3a;
    color: #ffffff;
    padding: 11px 16px;
    text-align: left;
    font-weight: 600;
    letter-spacing: 0.03em;

  td_style: |
    border-bottom: 1px solid #e8e4de;
    padding: 10px 16px;
    color: #1a1a1a;

  tr_odd_style: |
    background: rgba(0,0,0,0.02);

# 分隔线 — 极细的暖灰线
hr:
  style: |
    border: none;
    height: 1px;
    margin: 2.5em 0;
    background: #e0dcd6;

# 粗体 — 加重不变色
bold:
  style: |
    font-weight: 800;
    color: #1a1a1a;

# 斜体
italic:
  style: |
    font-style: italic;
    color: #666;

# 删除线
strikethrough:
  style: |
    text-decoration: line-through;
    color: #bbb;

# 页面背景
body:
  background: "#f4f1ec"
  padding: "20px"

# 装饰配置
decorations:
  h2_prefix: ""
  hr_text: ""

# 脚注
footnote:
  sup_style: |
    font-size: 0.75em;
    line-height: 0;
    vertical-align: super;
    margin: 0;
    padding: 0;
  ref_style: |
    color: inherit;
    text-decoration: none;
    border-bottom: 1px dashed #b5342b;
    padding-bottom: 1px;
  section_style: |
    margin-top: 2.5em;
    padding-top: 1.8em;
    border-top: 1px solid #e0dcd6;
  list_style: |
    list-style-type: decimal;
    margin: 0;
    padding-left: 1.5em;
  item_style: |
    font-size: 0.85em;
    color: #999;
    line-height: 1.6;
    margin-bottom: 0.3em;
  backref_style: |
    color: #b5342b;
    text-decoration: none;
    margin-left: 0.3em;

# GFM 提示框
gfm_alert:
  container_style: |
    margin: 1.5em 0;
    padding: 12px 16px;
    border-radius: 0;
  title_style: |
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  content_style: |
    color: #1a1a1a;
    line-height: 1.7;
    font-size: 14px;
  note_color: "#666666"
  tip_color: "#2e7d32"
  important_color: "#b5342b"
  warning_color: "#c0392b"
  caution_color: "#e67e22"

# 对话气泡
dialogue:
  container_style: |
    margin: 2em 0;
    padding: 18px;
    background: #f7f5f2;
    border-radius: 0;
    border: 1px solid #e0dcd6;

  title_style: |
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 14px;
    color: #1a1a1a;
    text-align: center;

  bubble_left_style: |
    background: #ffffff;
    color: #1a1a1a;
    padding: 10px 14px;
    border-radius: 10px;
    max-width: 65%;
    word-wrap: break-word;
    border: 1px solid #e0dcd6;

  bubble_right_style: |
    background: #b5342b;
    color: #ffffff;
    padding: 10px 14px;
    border-radius: 10px;
    max-width: 65%;
    word-wrap: break-word;
    box-shadow: 0 2px 6px rgba(181, 52, 43, 0.25);

  avatar_style: |
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
    margin: 0 10px;

  avatar_left_style: |
    background: #e0dcd6;
    color: #1a1a1a;

  avatar_right_style: |
    background: #b5342b;
    color: #ffffff;
