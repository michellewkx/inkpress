# Blueprint theme
# 工程蓝图风格，深蓝底色配白色线条

name: "蓝图"
description: "工程蓝图风格，深蓝底色配白色线条，专业技术感"
series: "tech"
tags: ["蓝图", "技术", "专业"]

# 容器样式 - 深蓝底色
container:
  max_width: "677px"
  padding: "16px"
  background: "#1b2838"
  border_radius: "10px"
  box_shadow: "0 4px 20px rgba(15, 25, 35, 0.4)"

# H1 样式 - 白色文字+底部淡蓝线
h1:
  style: |
    margin: 1.8em 8px 1em;
    padding: 0.8em 0;
    font-size: 22px;
    font-weight: 800;
    line-height: 1.3;
    color: #ecf0f1;
    text-align: center;
    border-bottom: 2px solid #5dade2;
    letter-spacing: 0.08em;

# H2 样式 - 淡蓝色+细左边框
h2:
  style: |
    margin: 2em 8px 0.75em;
    padding: 0px 0px 0.5em 14px;
    border-left: 3px solid #5dade2;
    border-bottom: 1px dashed rgba(93, 173, 226, 0.3);
    font-size: 20px;
    font-weight: 700;
    line-height: 1.3;
    color: #5dade2;

# H3 样式
h3:
  style: |
    margin: 1.8em 8px 0.6em;
    padding: 0px 0px 0.4em 12px;
    border-left: 3px solid #85c1e9;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
    color: #85c1e9;

# H4 样式
h4:
  style: |
    margin: 1.5em 8px 0.5em;
    padding-left: 12px;
    border-left: 2px solid #aed6f1;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
    color: #aed6f1;

# H5 样式
h5:
  style: |
    margin: 1.2em 8px 0.4em;
    padding-left: 10px;
    border-left: 2px solid #5dade2;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
    color: #aed6f1;

# H6 样式
h6:
  style: |
    margin: 1em 8px 0.3em;
    padding-left: 8px;
    border-left: 2px solid rgba(93, 173, 226, 0.5);
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
    color: #85c1e9;

# 段落样式 - 浅色文字
paragraph:
  style: |
    margin: 1.2em 8px;
    color: #d5dbdb;
    font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 15px;
    line-height: 1.75;
    letter-spacing: 0.06em;
    text-align: justify;

# 列表样式
list:
  container_style: |
    list-style: none;
    padding: 0;
    margin: 1.2em 8px;
    color: #d5dbdb;
    font-size: 15px;

  item_style: |
    margin: 0.5em 0;
    padding: 0;
    line-height: 1.75;
    font-size: 15px;
    color: #d5dbdb;

  ul_prefix: "- "
  ol_prefix: "{n}. "

# 代码块样式 - 更深蓝底
code_block:
  style: |
    margin: 1.5em 8px;
    padding: 1.2em;
    background-color: #0f1923;
    border-top: 2px solid #5dade2;
    border-radius: 6px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.5;

  code_inner_style: |
    background: none;
    padding: 0;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    font-size: 14px;
    color: #aed6f1;
    line-height: 1.5;

# 内联代码样式 - 青色文字+深色背景
inline_code:
  style: |
    font-size: 90%;
    color: #00bcd4;
    background-color: rgba(93, 173, 226, 0.12);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;

# 引用样式 - 青色左边框+偏亮蓝底
blockquote:
  style: |
    margin: 1.5em 8px;
    padding: 1em 1em 1em 1.5em;
    border-left: 4px solid #00bcd4;
    border-radius: 6px;
    background-color: #1e3246;
    color: #aed6f1;

  p_inner_style: |
    margin: 0;
    color: #aed6f1;
    line-height: 1.75;
    font-style: normal;

# 链接样式
link:
  style: |
    color: #5dade2;
    text-decoration: none;
    border-bottom: 1px solid rgba(93, 173, 226, 0.4);

# 图片样式
image:
  container_style: |
    margin: 1.5em 0;
    text-align: center;
    line-height: 1.6;
    font-size: 14px;
    color: #85c1e9;

  img_style: |
    max-width: 100%;
    display: block;
    margin: 0.5em auto;
    border-radius: 6px;
    box-shadow: 0 3px 12px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(93, 173, 226, 0.2);

# 表格样式
table:
  style: |
    width: 100%;
    border-collapse: collapse;
    margin: 1.5em 0;
    font-size: 14px;
    overflow: hidden;

  th_style: |
    padding: 10px 14px;
    text-align: left;
    font-weight: 700;
    color: #ecf0f1;
    background-color: #0f1923;
    border: 1px solid #2c4054;

  td_style: |
    padding: 8px 14px;
    border: 1px solid #2c4054;
    color: #d5dbdb;
    background-color: #1b2838;

# 分隔线样式 - 蓝图网格线
hr:
  style: |
    border: none;
    height: 1px;
    margin: 2em 0;
    background: linear-gradient(to right, transparent, #5dade2, #00bcd4, #5dade2, transparent);
    border-radius: 1px;

# 粗体样式
bold:
  style: |
    font-weight: 700;
    color: #ffffff;

# 斜体样式
italic:
  style: |
    font-style: italic;
    color: #85c1e9;

# 删除线样式
strikethrough:
  style: |
    text-decoration: line-through;
    color: #566573;

# 对话样式
dialogue:
  container_style: |
    margin: 2em 0;
    padding: 18px;
    background-color: #0f1923;
    border-radius: 10px;
    border: 1px solid #2c4054;

  title_style: |
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 14px;
    color: #5dade2;
    text-align: center;

  message_style: |
    display: flex;
    margin-bottom: 14px;
    align-items: flex-start;

  bubble_left_style: |
    background-color: #1e3246;
    color: #d5dbdb;
    padding: 10px 14px;
    border-radius: 10px;
    max-width: 65%;
    word-wrap: break-word;
    border: 1px solid #2c4054;

  bubble_right_style: |
    background: linear-gradient(135deg, #1a5276, #2e86c1);
    color: #ffffff;
    padding: 10px 14px;
    border-radius: 10px;
    max-width: 65%;
    word-wrap: break-word;
    box-shadow: 0 2px 8px rgba(93, 173, 226, 0.25);

  avatar_style: |
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
    margin: 0 10px;

  avatar_left_style: |
    background-color: #1e3246;
    color: #5dade2;
    border: 1px solid #2c4054;

  avatar_right_style: |
    background: linear-gradient(135deg, #1a5276, #2e86c1);
    color: #ffffff;

# 页面背景
body:
  background: "#0f1923"
  padding: "16px"
  margin: "0"

# 装饰配置
decorations: {}
