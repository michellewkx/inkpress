# inkpress 默认主题
# 蓝灰色系，清爽专业，适合各类内容

name: "墨印默认"
description: "蓝灰色系，清爽专业，适合各类内容"
series: "classic"
tags: ["默认", "蓝灰", "通用"]

# 容器样式
container:
  max_width: "677px"
  padding: "16px"
  background: "#ffffff"
  border_radius: "12px"
  box_shadow: "0 2px 12px rgba(44, 62, 80, 0.08)"

# H1 样式 - 深蓝灰背景色块
h1:
  style: |
    margin: 1.8em 8px 1em;
    padding: 0.9em 1.6em;
    font-size: 22px;
    font-weight: 800;
    line-height: 1.3;
    color: #ffffff;
    text-align: center;
    background: #2c3e50;
    border-radius: 8px;
    box-shadow: 0 3px 10px rgba(44, 62, 80, 0.2);
    letter-spacing: 0.05em;

# H2 样式 - 蓝色左边框+底部虚线
h2:
  style: |
    margin: 2em 8px 0.75em;
    padding: 0px 0px 0.5em 14px;
    border-left: 4px solid #3498db;
    border-bottom: 1px dashed #3498db;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.3;
    color: #2c3e50;

# H3 样式
h3:
  style: |
    margin: 1.8em 8px 0.6em;
    padding: 0px 0px 0.4em 12px;
    border-left: 4px solid #3498db;
    border-bottom: 1px dashed rgba(52, 152, 219, 0.4);
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
    color: #2c3e50;

# H4 样式
h4:
  style: |
    margin: 1.5em 8px 0.5em;
    padding-left: 12px;
    border-left: 3px solid #5dade2;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
    color: #34495e;

# H5 样式
h5:
  style: |
    margin: 1.2em 8px 0.4em;
    padding-left: 10px;
    border-left: 3px solid #85c1e9;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
    color: #34495e;

# H6 样式
h6:
  style: |
    margin: 1em 8px 0.3em;
    padding-left: 8px;
    border-left: 2px solid #aed6f1;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
    color: #5d6d7e;

# 段落样式
paragraph:
  style: |
    margin: 1.2em 8px;
    color: #2c3e50;
    font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 15px;
    line-height: 1.75;
    letter-spacing: 0.1em;
    text-align: justify;

# 列表样式
list:
  container_style: |
    list-style: none;
    padding: 0;
    margin: 1.2em 8px;
    color: #2c3e50;
    font-size: 15px;

  item_style: |
    margin: 0.5em 0;
    padding: 0;
    line-height: 1.75;
    font-size: 15px;
    color: #2c3e50;

  ul_prefix: "• "
  ol_prefix: "{n}. "

  nested_container_style: |
    list-style: none;
    padding: 0 0 0 1.5em;
    margin: 0.3em 0;
    font-size: 15px;

  nested_item_style: |
    margin: 0.3em 0;
    padding: 0;
    line-height: 1.75;
    font-size: 15px;
    color: #2c3e50;

  nested_ul_prefix: "◦ "

# 代码块样式
code_block:
  style: |
    margin: 1.5em 8px;
    padding: 1.2em;
    background-color: #f8f9fa;
    border-top: 3px solid #3498db;
    border-radius: 6px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.5;

  code_inner_style: |
    background: none;
    padding: 0;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    font-size: 14px;
    color: #2c3e50;
    line-height: 1.5;

# 内联代码样式
inline_code:
  style: |
    font-size: 90%;
    color: #3498db;
    background-color: rgba(52, 152, 219, 0.1);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;

# 引用样式
blockquote:
  style: |
    margin: 1.5em 8px;
    padding: 1em 1em 1em 1.5em;
    border-left: 4px solid #3498db;
    border-radius: 4px;
    background-color: #f0f4f8;
    color: #5d6d7e;
    font-style: italic;

  p_inner_style: |
    margin: 0;
    color: #5d6d7e;
    line-height: 1.75;
    font-style: italic;

# 链接样式
link:
  style: |
    color: #3498db;
    text-decoration: none;
    border-bottom: 1px solid rgba(52, 152, 219, 0.3);

# 图片样式
image:
  container_style: |
    margin: 1.5em 0;
    text-align: center;
    line-height: 1.6;
    font-size: 14px;
    color: #7f8c8d;

  img_style: |
    max-width: 100%;
    display: block;
    margin: 0.5em auto;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(44, 62, 80, 0.1);


  caption_style: |
    text-align: center;
    font-size: 0.85em;
    color: #7f8c8d;
    margin-top: 0.5em;

# 表格样式
table:
  wrapper_style: |
    overflow-x: auto;
    margin: 1.5em 8px;

  tr_odd_style: |
    background: rgba(52, 152, 219, 0.04);

  style: |
    width: 100%;
    border-collapse: collapse;
    margin: 1.5em 0;
    font-size: 14px;
    border-radius: 6px;
    overflow: hidden;

  th_style: |
    padding: 10px 14px;
    text-align: left;
    font-weight: 700;
    color: #ffffff;
    background-color: #3498db;
    border: 1px solid #2e86c1;

  td_style: |
    padding: 8px 14px;
    border: 1px solid #d5dbdb;
    color: #2c3e50;
    background-color: #ffffff;

# 分隔线样式 - 蓝灰渐变
hr:
  style: |
    border: none;
    height: 2px;
    margin: 2em 0;
    background: linear-gradient(to right, transparent, #3498db, #2c3e50, #3498db, transparent);
    border-radius: 2px;

# 粗体样式
bold:
  style: |
    font-weight: 700;
    color: #2980b9;

# 斜体样式
italic:
  style: |
    font-style: italic;
    color: #5d6d7e;

# 删除线样式
strikethrough:
  style: |
    text-decoration: line-through;
    color: #95a5a6;

# 对话样式
dialogue:
  container_style: |
    margin: 2em 0;
    padding: 18px;
    background-color: #f0f4f8;
    border-radius: 10px;
    border: 1px solid #d5dbdb;

  title_style: |
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 14px;
    color: #2c3e50;
    text-align: center;

  message_style: |
    display: flex;
    margin-bottom: 14px;
    align-items: flex-start;

  bubble_left_style: |
    background-color: #ffffff;
    color: #2c3e50;
    padding: 10px 14px;
    border-radius: 10px;
    max-width: 65%;
    word-wrap: break-word;
    border: 1px solid #d5dbdb;

  bubble_right_style: |
    background-color: #3498db;
    color: #ffffff;
    padding: 10px 14px;
    border-radius: 10px;
    max-width: 65%;
    word-wrap: break-word;
    box-shadow: 0 2px 6px rgba(52, 152, 219, 0.25);

  avatar_style: |
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
    margin: 0 10px;

  avatar_left_style: |
    background-color: #d5dbdb;
    color: #2c3e50;

  avatar_right_style: |
    background-color: #3498db;
    color: #ffffff;

# 页面背景
body:
  background: "#eef2f7"
  padding: "16px"
  margin: "0"

# 装饰配置
decorations:
  h2_prefix: "✦ "
  hr_text: "— ✦ —"

# 脚注样式
footnote:
  sup_style: |
    font-size: 0.75em;
    line-height: 0;
    vertical-align: super;
    margin: 0;
    padding: 0;
  ref_style: |
    color: inherit;
    text-decoration: none;
    border-bottom: 1px dashed #3498db;
    padding-bottom: 1px;
  section_style: |
    margin-top: 2.5em;
    padding-top: 1.8em;
    border-top: 1px solid #d5e8f5;
  list_style: |
    list-style-type: decimal;
    margin: 0;
    padding-left: 1.5em;
  item_style: |
    font-size: 0.85em;
    color: #95a5a6;
    line-height: 1.6;
    margin-bottom: 0.3em;
  backref_style: |
    color: #3498db;
    text-decoration: none;
    margin-left: 0.3em;

# GFM 提示框样式
gfm_alert:
  container_style: |
    margin: 1.5em 8px;
    padding: 12px 16px;
    border-radius: 4px;
  title_style: |
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  content_style: |
    color: #2c3e50;
    line-height: 1.6;
    font-size: 14px;
  note_color: "#3498db"
  tip_color: "#27ae60"
  important_color: "#f39c12"
  warning_color: "#e74c3c"
  caution_color: "#e67e22"

# 图片说明样式
