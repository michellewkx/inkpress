# 时尚杂志风格 - High Fashion Magazine
# 灵感来源: Vogue, Harper's Bazaar 等高端时尚杂志

name: "时尚"
description: "高端时尚杂志风格，极简黑白搭配优雅衬线字体"
series: "magazine"
tags: ["时尚", "高级", "杂志"]

# 容器样式
container:
  max_width: "677px"
  padding: "20px"
  background: "#ffffff"
  border_radius: "0px"
  box_shadow: ""

# H1 样式 - ALL CAPS 感，宽字距，纤细字重
h1:
  style: |
    padding: 0.6em 0;
    margin: 1.8em 0 1em;
    font-size: 26px;
    font-weight: 300;
    text-align: left;
    letter-spacing: 0.3em;
    line-height: 1.4;
    color: #000000;
    border-bottom: 2px solid #000000;
    font-family: Georgia, 'Times New Roman', serif;

# H2 样式 - 大写感，中等字距
h2:
  style: |
    margin: 2em 0 0.8em;
    padding: 0 0 0.5em 0;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.15em;
    line-height: 1.3;
    color: #000000;
    border-bottom: 1px solid #dddddd;
    font-family: Georgia, 'Times New Roman', serif;

# H3 样式
h3:
  style: |
    margin: 1.8em 0 0.6em;
    padding: 0;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.1em;
    line-height: 1.3;
    color: #000000;
    font-family: Georgia, 'Times New Roman', serif;

# H4 样式
h4:
  style: |
    margin: 1.5em 0 0.5em;
    padding: 0;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.08em;
    line-height: 1.3;
    color: #333333;
    font-family: Georgia, 'Times New Roman', serif;

# H5 样式
h5:
  style: |
    margin: 1.2em 0 0.4em;
    padding: 0;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.05em;
    line-height: 1.3;
    color: #333333;
    font-family: Georgia, 'Times New Roman', serif;

# H6 样式
h6:
  style: |
    margin: 1em 0 0.3em;
    padding: 0;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    line-height: 1.3;
    color: #666666;
    font-family: Georgia, 'Times New Roman', serif;

# 段落样式 - 衬线字体，宽行距
paragraph:
  style: |
    margin: 1.4em 0;
    color: #333333;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 16px;
    line-height: 1.9;
    letter-spacing: 0.02em;

# 列表样式
list:
  container_style: |
    list-style: none;
    padding: 0;
    margin: 1.2em 0;
    color: #333333;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 16px;

  item_style: |
    margin: 0.5em 0;
    padding: 0;
    line-height: 1.8;
    font-size: 16px;

  ul_prefix: "— "
  ol_prefix: "{n}. "

  nested_container_style: |
    list-style: none;
    padding: 0 0 0 1.5em;
    margin: 0.3em 0;
    font-size: 15px;

  nested_item_style: |
    margin: 0.3em 0;
    padding: 0;
    line-height: 1.75;
    font-size: 15px;
    color: #333333;

  nested_ul_prefix: "◦ "

# 代码块样式 - 极简灰底
code_block:
  style: |
    margin: 1.5em 0;
    padding: 1.2em;
    background-color: #f5f5f5;
    border-radius: 0px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.5;
    border: 1px solid #e0e0e0;

  code_inner_style: |
    background: none;
    padding: 0;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;
    font-size: 14px;
    color: #333333;
    line-height: 1.5;

# 内联代码样式 - 微妙灰色
inline_code:
  style: |
    font-size: 90%;
    color: #333333;
    background-color: #f0f0f0;
    padding: 2px 6px;
    border-radius: 2px;
    font-family: 'SFMono-Regular', Consolas, Menlo, monospace;

# 引用样式 - Pull-quote 风格，居中大字斜体
blockquote:
  style: |
    margin: 2em 0;
    padding: 1.5em 2em;
    border-left: none;
    border-top: 1px solid #cccccc;
    border-bottom: 1px solid #cccccc;
    text-align: center;

  p_inner_style: |
    margin: 0;
    color: #666666;
    font-size: 20px;
    line-height: 1.7;
    font-style: italic;
    font-family: Georgia, 'Times New Roman', serif;
    letter-spacing: 0.02em;

# 链接样式 - 黑色下划线
link:
  style: |
    color: #000000;
    text-decoration: underline;

# 图片样式 - 全宽，微妙阴影
image:
  container_style: |
    margin: 2em 0;
    text-align: center;
    line-height: 1.6;
    font-size: 13px;
    color: #999999;
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;

  img_style: |
    max-width: 100%;
    display: block;
    margin: 1.5em auto;
    border-radius: 0px;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);


  caption_style: |
    text-align: center;
    font-size: 0.8em;
    color: #999999;
    margin-top: 0.5em;
    font-style: italic;
    font-family: Georgia, 'Times New Roman', serif;
    letter-spacing: 0.05em;

# 表格样式
table:
  wrapper_style: |
    overflow-x: auto;
    margin: 1.5em 8px;

  tr_odd_style: |
    background: rgba(0, 0, 0, 0.03);

  style: |
    width: 100%;
    border-collapse: collapse;
    margin: 1.5em 0;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 15px;

  th_style: |
    padding: 12px 15px;
    text-align: left;
    font-weight: 600;
    color: #000000;
    border-bottom: 2px solid #000000;
    letter-spacing: 0.08em;

  td_style: |
    padding: 10px 15px;
    border-bottom: 1px solid #e0e0e0;
    color: #333333;

# 分隔线样式 - 纤细黑色线
hr:
  style: |
    border: none;
    height: 1px;
    margin: 2.5em 0;
    background-color: #000000;

# 粗体样式 - 纯黑加粗
bold:
  style: |
    font-weight: 700;
    color: #000000;

# 斜体样式
italic:
  style: |
    font-style: italic;
    color: #333333;

# 删除线样式
strikethrough:
  style: |
    text-decoration: line-through;
    color: #999999;

# 对话样式
dialogue:
  container_style: |
    margin: 2em 0;
    padding: 20px;
    background-color: #fafafa;
    border-radius: 0px;
    border: 1px solid #e0e0e0;

  title_style: |
    font-size: 18px;
    font-weight: 300;
    margin-bottom: 16px;
    color: #000000;
    text-align: center;
    letter-spacing: 0.15em;
    font-family: Georgia, 'Times New Roman', serif;

  message_style: |
    display: flex;
    margin-bottom: 16px;
    align-items: flex-start;

  bubble_left_style: |
    background-color: #ffffff;
    color: #333333;
    padding: 10px 14px;
    border-radius: 4px;
    max-width: 65%;
    word-wrap: break-word;
    border: 1px solid #e0e0e0;
    font-family: Georgia, 'Times New Roman', serif;

  bubble_right_style: |
    background-color: #000000;
    color: #ffffff;
    padding: 10px 14px;
    border-radius: 4px;
    max-width: 65%;
    word-wrap: break-word;

  avatar_style: |
    width: 40px;
    height: 40px;
    border-radius: 0px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 300;
    font-size: 14px;
    flex-shrink: 0;
    margin: 0 12px;
    letter-spacing: 0.05em;

  avatar_left_style: |
    background-color: #f0f0f0;
    color: #000000;
    border: 1px solid #e0e0e0;

  avatar_right_style: |
    background-color: #000000;
    color: #ffffff;

# 装饰配置
decorations:
  h2_prefix: "/ "
  blockquote_prefix: ""
  blockquote_suffix: ""
  hr_text: "— — —"

# 页面背景
body:
  background: "#f5f5f0"
  padding: "16px"
  margin: "0"

# 脚注样式
footnote:
  sup_style: |
    font-size: 0.75em;
    line-height: 0;
    vertical-align: super;
    margin: 0;
    padding: 0;
  ref_style: |
    color: inherit;
    text-decoration: none;
    border-bottom: 1px dashed #000000;
    padding-bottom: 1px;
  section_style: |
    margin-top: 2.5em;
    padding-top: 1.8em;
    border-top: 1px solid #e0e0e0;
  list_style: |
    list-style-type: decimal;
    margin: 0;
    padding-left: 1.5em;
  item_style: |
    font-size: 0.85em;
    color: #999999;
    line-height: 1.6;
    margin-bottom: 0.3em;
  backref_style: |
    color: #000000;
    text-decoration: none;
    margin-left: 0.3em;

# GFM 提示框样式
gfm_alert:
  container_style: |
    margin: 1.5em 8px;
    padding: 12px 16px;
    border-radius: 4px;
  title_style: |
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  content_style: |
    color: #333333;
    line-height: 1.6;
    font-size: 14px;
  note_color: "#000000"
  tip_color: "#444444"
  important_color: "#666666"
  warning_color: "#333333"
  caution_color: "#888888"

# 图片说明样式
